<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CodeAlpha Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <h1><a href="index.html" style="color: white; text-decoration: none;">CodeAlpha Store</a></h1>
    </nav>

    <main style="max-width: 400px; margin: 2rem auto; text-align: center;">
        <h2>Welcome Back</h2>
        <form id="login-form" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <input type="email" id="login-email" placeholder="Email" required style="padding: 10px;">
            <input type="password" id="login-password" placeholder="Password" required style="padding: 10px;">
            <button type="submit" style="padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer;">Login</button>
        </form>
        <p style="margin-top: 15px;">Need an account? <a href="register.html">Register here</a></p>
    </main>

    <script src="auth.js"></script>
</body>
</html>
